    <section class="login-form d-flex align-items-center">
        <div class="container">
            <div class="login-form-title text-center">
                <a href="/" class="d-inline-block">

                </a>
                <h2>Welcome Back !</h2>
            </div>
            <div class="login-form-box">
                <div class="login-card">
                    <form class="" action="/login/" method="POST">
                        <div class="form-group">
                            <label for="exampleInputEmail1">Enter Your E-mail</label>
                            <input class="input-field form_style" type="email" id="exampleInputEmail1" name="email"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="exampleInputPassword1">Enter Your Password</label>
                            <input class="input-field form_style" type="password" id="exampleInputPassword1"
                                name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary hover-effect">Login</button>
                        <div>
                            <label class="font-weight-normal mb-0" style="cursor: pointer;">
                                <input class="checkbox" type="checkbox" name="userRememberMe">
                                Remember me
                            </label>
                            <a href="javascript:void(0)" class="forgot-password float-right" data-phantom-reset-url>Lost Password?</a>
                        </div>
                    </form>
                </div>
                <div class="join-now-outer text-center">
                    <a href="/join-now/">Join now, create your FREE account</a>
                </div>
